volumes:
  sockets:
    driver_opts:
      type: tmpfs
      device: tmpfs

networks:
  rinha:
    driver: bridge

services:
  lb:
    build:
      context: .
      dockerfile: Dockerfile.lb
    container_name: rinha-lb
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30MB"

  api1:
    #image: hisraelbraga/hisrael-rinha-rust-2026:initial
    build:
      context: .
      args:
        FEATURES: ${FEATURES:-}
    environment:
      - PORT=8080
      - INSTANCE_ID=1
    volumes:
      - sockets:/tmp/sockets
    networks:
      - rinha
    healthcheck:
      test: [ "CMD", "curl", "-f", "--unix-socket", "/tmp/sockets/api1.sock", "http://localhost/ready" ]
      timeout: 1s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160MB"

  api2:
    #image: hisraelbraga/hisrael-rinha-rust-2026:initial
    build:
      context: .
      args:
        FEATURES: ${FEATURES:-}
    environment:
      - PORT=8080
      - INSTANCE_ID=2
    volumes:
      - sockets:/tmp/sockets
    networks:
      - rinha
    healthcheck:
      test: [ "CMD", "curl", "-f", "--unix-socket", "/tmp/sockets/api2.sock", "http://localhost/ready" ]
      timeout: 1s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160MB"
