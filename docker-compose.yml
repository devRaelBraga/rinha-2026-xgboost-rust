volumes:
  sockets:
    driver_opts:
      type: tmpfs
      device: tmpfs

services:

  lb:
    image: hisraelbraga/hisrael-lb-rust:v1
    container_name: rinha-lb
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    logging:
      driver: "none"
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"

  api1:
    image: hisraelbraga/hisrael-rinha-rust-2026:v3.1
    environment:
      - PORT=8080
      - INSTANCE_ID=1
    volumes:
      - sockets:/tmp/sockets
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    logging:
      driver: "none"
    healthcheck:
      test: [ "CMD", "curl", "-f", "--unix-socket", "/tmp/sockets/api1.sock", "http://localhost/ready" ]
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    image: hisraelbraga/hisrael-rinha-rust-2026:v3.1
    environment:
      - PORT=8080
      - INSTANCE_ID=2
    volumes:
      - sockets:/tmp/sockets
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    logging:
      driver: "none"
    healthcheck:
      test: [ "CMD", "curl", "-f", "--unix-socket", "/tmp/sockets/api2.sock", "http://localhost/ready" ]
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"
